<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stok Bahan Ajar - Vue</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <style>
        * {
            box-sizing: border-box;
            font-family: Segoe UI, Arial, sans-serif
        }
        
        body {
            margin: 0;
            background: linear-gradient(180deg, #edf3ff, #e7effa);
            color: #1d2b45;
            padding: 20px;
        }
        
        .app {
            max-width: 1420px;
            margin: auto;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 16px 38px rgba(21, 39, 84, .14);
            border: 1px solid #dfe7f7;
            overflow: visible;
        }
        
        .header {
            padding: 22px;
            background: linear-gradient(135deg, #001a5c, #1f52b7);
            color: #fff;
            text-align: center
        }
        
        .header h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 700
        }
        
        .header p {
            margin: 0;
            opacity: .9
        }
        
        .content {
            padding: 18px
        }
        
        .page-nav {
            margin-bottom: 14px
        }
        
        .page-nav a {
            display: inline-block;
            padding: 8px 14px;
            border-radius: 10px;
            background: #fff;
            border: 1px solid #d5def2;
            color: #1a3a78;
            font-weight: 700;
            font-size: 14px;
            text-decoration: none;
            box-shadow: 0 2px 8px rgba(21, 39, 84, .06);
        }
        
        .page-nav a:hover {
            background: #f4f7fe
        }
        
        .layout-split {
            display: flex;
            flex-wrap: nowrap;
            align-items: flex-start;
            gap: 20px;
        }
        
        .col-main {
            flex: 1 1 0;
            min-width: 0;
        }
        
        .col-sidebar {
            flex: 0 0 268px;
            min-width: 240px;
            max-width: 268px;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(160px, 1fr));
            gap: 12px;
            margin-bottom: 12px
        }
        
        .grid-filters {
            grid-template-columns: repeat(3, minmax(140px, 1fr))
        }
        
        .search-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 12px;
            align-items: stretch;
        }
        
        .search-row input {
            flex: 1;
            min-width: 0
        }
        
        input,
        select {
            width: 100%;
            padding: 10px 11px;
            border: 1px solid #d5def2;
            border-radius: 10px;
            background: #fff;
            color: #1e2a44;
            transition: border-color .2s ease, box-shadow .2s ease;
        }
        
        input:focus,
        select:focus {
            outline: none;
            border-color: #3b6ac9;
            box-shadow: 0 0 0 3px rgba(59, 106, 201, .15);
        }
        
        .btn {
            border: none;
            border-radius: 10px;
            padding: 10px 13px;
            font-weight: 700;
            cursor: pointer;
            transition: transform .15s ease, box-shadow .2s ease, background .2s ease;
        }
        
        .btn:hover {
            transform: translateY(-1px)
        }
        
        .btn-primary {
            background: #1745a7;
            color: #fff;
            box-shadow: 0 8px 20px rgba(23, 69, 167, .25)
        }
        
        .btn-secondary {
            background: #e9f0fe;
            color: #1a3a78
        }
        
        .btn-danger {
            background: #fee2e2;
            color: #9f1239
        }
        
        .btn-warning {
            background: #fff7ed;
            color: #b45309
        }
        
        .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 12px;
            align-items: center;
        }
        
        .actions label {
            background: #f4f7fe;
            border: 1px solid #dce5f8;
            border-radius: 10px;
            padding: 8px 11px;
            font-size: 13px;
            color: #3a4d73;
        }
        
        table {
            border-collapse: collapse
        }
        
        .stok-table {
            width: 100%;
            table-layout: fixed;
            border-collapse: collapse;
        }
        
        .stok-table th,
        .stok-table td {
            border-bottom: 1px solid #edf1fa;
            padding: 8px 6px;
            font-size: 12px;
            text-align: left;
            vertical-align: top;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }
        
        .stok-table th:nth-child(5),
        .stok-table th:nth-child(6),
        .stok-table td:nth-child(5),
        .stok-table td:nth-child(6) {
            text-align: right;
            white-space: nowrap;
            overflow-wrap: normal;
        }
        
        .stok-table th:nth-child(7),
        .stok-table td:nth-child(7) {
            text-align: right;
            white-space: nowrap;
            font-size: 11px;
            overflow-wrap: normal;
        }
        
        .stok-table th:nth-child(8),
        .stok-table td:nth-child(8) {
            text-align: center;
        }
        
        .stok-table td:nth-child(9) {
            font-size: 11px;
            line-height: 1.35;
            word-break: break-word;
        }
        
        .stok-table th:nth-child(10),
        .stok-table td:nth-child(10) {
            text-align: center;
            vertical-align: middle;
            white-space: nowrap;
            overflow-wrap: normal;
            word-break: normal;
        }
        
        .stok-table td:nth-child(10) .btn {
            padding: 6px 12px;
            font-size: 12px;
            white-space: nowrap;
        }
        
        .stok-table .badge {
            display: inline-block;
            white-space: nowrap;
            max-width: 100%;
            line-height: 1.2;
            font-size: 11px;
            padding: 3px 8px;
        }
        
        .stok-table td:nth-child(8) .badge {
            white-space: normal;
        }
        
        .stok-table thead th {
            position: sticky;
            top: 0;
            background: #f3f7ff;
            color: #344a74;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: .02em;
            z-index: 1;
            box-shadow: 0 1px 0 #dde7fa;
        }
        
        .stok-table tbody tr:hover {
            background: #f9fbff
        }
        
        .table-wrap {
            width: 100%;
            min-width: 0;
            overflow-x: hidden;
            overflow-y: auto;
            border: 1px solid #dde7fa;
            border-radius: 12px;
            background: #fff;
            max-height: min(62vh, 640px);
        }
        
        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700
        }
        
        .aman {
            background: #dcfce7;
            color: #15803d
        }
        
        .menipis {
            background: #ffedd5;
            color: #c2410c
        }
        
        .kosong {
            background: #fee2e2;
            color: #b91c1c
        }
        
        .edit-row {
            background: #f8faff
        }
        
        .edit-row .grid {
            grid-template-columns: repeat(2, minmax(0, 1fr));
            margin-bottom: 8px;
        }
        
        .small {
            font-size: 12px;
            color: #64748b;
            font-weight: 600;
            margin-bottom: 5px;
            display: block
        }
        
        .form-plus {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 22px;
            height: 22px;
            border-radius: 6px;
            background: linear-gradient(145deg, #6d28d9, #a78bfa);
            color: #fff;
            font-size: 14px;
            font-weight: 800;
            line-height: 1;
            flex-shrink: 0;
        }
        
        .form-add {
            padding: 11px 11px 12px;
            border: 1px solid #d8e4fb;
            border-radius: 10px;
            background: #fff;
            box-shadow: 0 2px 12px rgba(21, 39, 84, .08);
            position: sticky;
            top: 12px;
        }
        
        .form-add h3 {
            margin: 0 0 10px;
            padding-bottom: 8px;
            border-bottom: 1px solid #e8eef9;
            color: #1a2d52;
            font-size: 14px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 7px;
        }
        
        .form-fields {
            display: flex;
            flex-direction: column;
            gap: 7px;
            align-items: stretch;
        }
        
        .form-fields .form-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 4px;
            margin-bottom: 0;
        }
        
        .form-row-pair {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 7px;
        }
        
        .form-add .small {
            font-size: 11px;
            margin-bottom: 3px;
            color: #5a6b86;
        }
        
        .form-add input,
        .form-add select {
            padding: 7px 8px;
            font-size: 13px;
            border-radius: 8px;
        }
        
        .form-add textarea {
            min-height: 52px;
            padding: 7px 8px;
            font-size: 12px;
            border-radius: 8px;
            line-height: 1.35;
        }
        
        .form-add .btn {
            padding: 7px 12px;
            font-size: 13px;
            border-radius: 8px;
        }
        
        .form-add .btn:hover {
            transform: none
        }
        
        textarea {
            width: 100%;
            padding: 10px 11px;
            border: 1px solid #d5def2;
            border-radius: 10px;
            background: #fff;
            color: #1e2a44;
            min-height: 88px;
            resize: vertical;
            font-family: inherit;
            font-size: 14px;
        }
        
        textarea:focus {
            outline: none;
            border-color: #3b6ac9;
            box-shadow: 0 0 0 3px rgba(59, 106, 201, .15);
        }
        
        .btn-save {
            background: #92400e;
            color: #fff;
            box-shadow: 0 8px 18px rgba(146, 64, 14, .22)
        }
        
        .btn-save:hover {
            background: #b45309
        }
        
        .empty {
            text-align: center;
            padding: 15px;
            color: #6c7898
        }
        
        @media (max-width: 768px) {
            .layout-split {
                flex-direction: column;
                flex-wrap: wrap;
            }
            .col-sidebar {
                flex: none;
                min-width: 0;
                max-width: none;
                width: 100%;
            }
            .form-add {
                position: static
            }
        }
        
        @media (max-width: 900px) {
            .grid {
                grid-template-columns: repeat(2, minmax(140px, 1fr))
            }
            .grid-filters {
                grid-template-columns: 1fr 1fr
            }
        }
        
        @media (max-width: 600px) {
            body {
                padding: 10px
            }
            .content {
                padding: 12px
            }
            .grid {
                grid-template-columns: 1fr
            }
            .grid-filters {
                grid-template-columns: 1fr
            }
            .form-row-pair {
                grid-template-columns: 1fr
            }
        }
    </style>
</head>

<body>
    <div id="stok-app" class="app">
        <div class="header">
            <h1>📚 Daftar Stok Bahan Ajar</h1>
        </div>
        <div class="content">
            <div class="page-nav">
                <a href="dashboard.html">&larr; Dashboard</a>
            </div>
            <div class="layout-split">
                <div class="col-main">
                    <div class="grid grid-filters">
                        <div><label class="small">UT-Daerah</label><select v-model="filters.upbjj"><option value="">Semua</option><option v-for="u in upbjjOptions" :key="u" :value="u">{{ u }}</option></select></div>
                        <div v-if="filters.upbjj"><label class="small">Kategori</label><select v-model="filters.kategori"><option value="">Semua</option><option v-for="k in kategoriOptions" :key="k" :value="k">{{ k }}</option></select></div>
                        <div><label class="small">Urutkan</label><select v-model="filters.sortBy"><option value="judul">Judul</option><option value="qty">Stok</option><option value="harga">Harga</option></select></div>
                    </div>
                    <div class="actions">
                        <label><input type="checkbox" v-model="filters.onlyLow"> Stok &lt; safety</label>
                        <label><input type="checkbox" v-model="filters.onlyZero"> Stok = 0</label>
                        <button type="button" class="btn btn-secondary" @click="resetFilters">Reset filter</button>
                    </div>
                    <div class="search-row">
                        <input v-model="filters.keyword" type="search" placeholder="Masukkan kode atau judul mata kuliah…" autocomplete="off">
                        <button type="button" class="btn btn-primary" @click="scrollToTable">Cari</button>
                        <button type="button" class="btn btn-secondary" @click="filters.keyword = ''">Reset</button>
                    </div>
                    <div class="table-wrap" ref="tableWrap">
                        <table class="stok-table">
                            <colgroup>
                                <col style="width: 16%">
                                <col style="width: 10%">
                                <col style="width: 12%">
                                <col style="width: 8%">
                                <col style="width: 6%">
                                <col style="width: 6%">
                                <col style="width: 9%">
                                <col style="width: 11%">
                                <col style="width: 12%">
                                <col style="width: 10%">
                            </colgroup>
                            <thead>
                                <tr>
                                    <th>Kode/Judul</th>
                                    <th>Kategori</th>
                                    <th>UT-Daerah</th>
                                    <th>Lokasi Rak</th>
                                    <th>Qty</th>
                                    <th>Safety</th>
                                    <th>Harga</th>
                                    <th>Status</th>
                                    <th>Catatan</th>
                                    <th>Aksi</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr v-if="filteredAndSortedStock.length === 0">
                                    <td colspan="10" class="empty">Data tidak ditemukan.</td>
                                </tr>
                                <template v-for="item in filteredAndSortedStock" :key="item.id">
                            <tr>
                                <td><strong>{{ item.kode }}</strong><br>{{ item.judul }}</td>
                                <td>{{ item.kategori }}</td>
                                <td>{{ item.upbjj }}</td>
                                <td>{{ item.lokasiRak }}</td>
                                <td>{{ item.qty }}</td>
                                <td>{{ item.safety }}</td>
                                <td>{{ toRupiah(item.harga) }}</td>
                                <td><span class="badge" :class="statusInfo(item).className">{{ statusInfo(item).icon }} {{ statusInfo(item).label }}</span></td>
                                <td><span v-html="item.catatanHTML"></span></td>
                                <td><button class="btn btn-warning" @click="startEdit(item)">Edit</button></td>
                            </tr>
                            <tr v-if="editingId === item.id" class="edit-row">
                                <td colspan="10">
                                    <div class="grid">
                                        <div><label class="small">Qty</label><input type="number" min="0" v-model.number="editForm.qty"></div>
                                        <div><label class="small">Safety</label><input type="number" min="0" v-model.number="editForm.safety"></div>
                                        <div><label class="small">Harga</label><input type="number" min="0" v-model.number="editForm.harga"></div>
                                        <div><label class="small">Catatan HTML</label><input v-model="editForm.catatanHTML"></div>
                                    </div>
                                    <div class="actions">
                                        <button class="btn btn-primary" @click="saveEdit(item.id)">Simpan</button>
                                        <button class="btn btn-danger" @click="cancelEdit">Batal</button>
                                    </div>
                                </td>
                            </tr>
                        </template>
                            </tbody>
                        </table>
                    </div>
                </div>
                <aside class="col-sidebar">
                    <div class="form-add">
                        <h3><span class="form-plus" aria-hidden="true">+</span> Tambah stok baru</h3>
                        <div class="form-fields">
                            <div><label class="small">Kode mata kuliah</label><input v-model="newItem.kode" placeholder="contoh: EKMA4216"></div>
                            <div><label class="small">Judul mata kuliah</label><input v-model="newItem.judul" placeholder="Judul lengkap"></div>
                            <div><label class="small">Kategori</label><select v-model="newItem.kategori"><option value="">— Pilih kategori —</option><option v-for="k in allKategoriOptions" :key="k" :value="k">{{ k }}</option></select></div>
                            <div><label class="small">UT-Daerah</label><select v-model="newItem.upbjj"><option value="">— Pilih UT-Daerah —</option><option v-for="u in upbjjOptions" :key="u" :value="u">{{ u }}</option></select></div>
                            <div><label class="small">Lokasi rak</label><input v-model="newItem.lokasiRak" placeholder="contoh: RAK-A1"></div>
                            <div class="form-row-pair">
                                <div><label class="small">Qty</label><input type="number" min="0" v-model.number="newItem.qty"></div>
                                <div><label class="small">Safety</label><input type="number" min="0" v-model.number="newItem.safety"></div>
                            </div>
                            <div><label class="small">Harga</label><input type="number" min="0" v-model.number="newItem.harga"></div>
                            <div><label class="small">Catatan (HTML)</label><textarea v-model="newItem.catatanHTML" placeholder="tambahkan catatan"></textarea></div>
                            <div class="form-actions">
                                <button type="button" class="btn btn-save" @click="addItem">Simpan</button>
                                <button type="button" class="btn btn-secondary" @click="resetNewForm">Reset</button>
                            </div>
                        </div>
                    </div>
                </aside>
            </div>
        </div>
    </div>

    <script src="js/data.js"></script>
    <script>
        const {
            createApp
        } = Vue;
        createApp({
            data() {
                return {
                    stockList: [],
                    filters: {
                        keyword: "",
                        upbjj: "",
                        kategori: "",
                        onlyLow: false,
                        onlyZero: false,
                        sortBy: "judul"
                    },
                    editingId: null,
                    editForm: {
                        qty: 0,
                        safety: 0,
                        harga: 0,
                        catatanHTML: ""
                    },
                    newItem: {
                        kode: "",
                        judul: "",
                        kategori: "",
                        upbjj: "",
                        lokasiRak: "",
                        qty: 0,
                        safety: 0,
                        harga: 0,
                        catatanHTML: ""
                    }
                };
            },
            mounted() {
                const saved = localStorage.getItem("stokBahanAjarVue");
                const fallback = () => JSON.parse(JSON.stringify(window.dataStokBahanAjar || []));
                if (saved) {
                    try {
                        const parsed = JSON.parse(saved);
                        if (Array.isArray(parsed) && parsed.length > 0) {
                            this.stockList = parsed;
                        } else {
                            this.stockList = fallback();
                        }
                    } catch (error) {
                        this.stockList = fallback();
                    }
                } else {
                    this.stockList = fallback();
                }
            },
            computed: {
                upbjjOptions() {
                    return [...new Set((window.upbjjList || []).map(item => item.nama))];
                },
                allKategoriOptions() {
                    const set = new Set();
                    (window.upbjjList || []).forEach(entry => (entry.kategoriList || []).forEach(k => set.add(k)));
                    return [...set].sort();
                },
                kategoriOptions() {
                    if (!this.filters.upbjj) return [];
                    const selected = (window.upbjjList || []).find(item => item.nama === this.filters.upbjj);
                    return selected ? selected.kategoriList : [];
                },
                filteredAndSortedStock() {
                    let result = [...this.stockList];
                    const keyword = this.filters.keyword.trim().toLowerCase();
                    if (keyword) {
                        result = result.filter(item => {
                            const k = String(item.kode || "").toLowerCase();
                            const j = String(item.judul || "").toLowerCase();
                            return k.includes(keyword) || j.includes(keyword);
                        });
                    }
                    if (this.filters.upbjj) result = result.filter(item => item.upbjj === this.filters.upbjj);
                    if (this.filters.kategori) result = result.filter(item => item.kategori === this.filters.kategori);
                    if (this.filters.onlyLow) result = result.filter(item => Number(item.qty) < Number(item.safety));
                    if (this.filters.onlyZero) result = result.filter(item => Number(item.qty) === 0);
                    result.sort((a, b) => {
                        if (this.filters.sortBy === "judul") {
                            return String(a.judul || "").localeCompare(String(b.judul || ""));
                        }
                        return Number(a[this.filters.sortBy]) - Number(b[this.filters.sortBy]);
                    });
                    return result;
                }
            },
            watch: {
                "filters.upbjj" () {
                    this.filters.kategori = "";
                },
                stockList: {
                    deep: true,
                    handler(newValue) {
                        localStorage.setItem("stokBahanAjarVue", JSON.stringify(newValue));
                    }
                }
            },
            methods: {
                scrollToTable() {
                    this.$refs.tableWrap?.scrollIntoView({
                        behavior: "smooth",
                        block: "nearest"
                    });
                },
                toRupiah(value) {
                    return new Intl.NumberFormat("id-ID", {
                        style: "currency",
                        currency: "IDR",
                        maximumFractionDigits: 0
                    }).format(Number(value) || 0);
                },
                statusInfo(item) {
                    if (Number(item.qty) === 0) return {
                        label: "Kosong",
                        className: "kosong",
                        icon: "⛔"
                    };
                    if (Number(item.qty) < Number(item.safety)) return {
                        label: "Menipis",
                        className: "menipis",
                        icon: "⚠️"
                    };
                    return {
                        label: "Aman",
                        className: "aman",
                        icon: "✅"
                    };
                },
                resetFilters() {
                    this.filters = {
                        keyword: "",
                        upbjj: "",
                        kategori: "",
                        onlyLow: false,
                        onlyZero: false,
                        sortBy: "judul"
                    };
                },
                startEdit(item) {
                    this.editingId = item.id;
                    this.editForm = {
                        qty: Number(item.qty),
                        safety: Number(item.safety),
                        harga: Number(item.harga),
                        catatanHTML: item.catatanHTML || ""
                    };
                },
                cancelEdit() {
                    this.editingId = null;
                },
                saveEdit(id) {
                    if (this.editForm.qty < 0 || this.editForm.safety < 0 || this.editForm.harga < 0) return alert("Nilai qty/safety/harga tidak boleh negatif.");
                    const idx = this.stockList.findIndex(item => item.id === id);
                    if (idx === -1) return;
                    this.stockList[idx] = {...this.stockList[idx],
                        ...this.editForm
                    };
                    this.editingId = null;
                },
                addItem() {
                    const required = ["kode", "judul", "kategori", "upbjj", "lokasiRak", "catatanHTML"];
                    const isMissing = required.some(key => !String(this.newItem[key] || "").trim());
                    if (isMissing) return alert("Semua field wajib diisi.");
                    if (this.newItem.qty < 0 || this.newItem.safety < 0 || this.newItem.harga < 0) return alert("Qty, safety, dan harga tidak boleh negatif.");
                    const exists = this.stockList.some(item => String(item.kode || "").toLowerCase() === this.newItem.kode.trim().toLowerCase());
                    if (exists) return alert("Kode mata kuliah sudah ada.");
                    this.stockList.push({
                        id: Date.now(),
                        kode: this.newItem.kode.trim().toUpperCase(),
                        judul: this.newItem.judul.trim(),
                        kategori: this.newItem.kategori.trim(),
                        upbjj: this.newItem.upbjj,
                        lokasiRak: this.newItem.lokasiRak.trim(),
                        qty: Number(this.newItem.qty),
                        safety: Number(this.newItem.safety),
                        harga: Number(this.newItem.harga),
                        catatanHTML: this.newItem.catatanHTML.trim()
                    });
                    this.resetNewForm();
                },
                resetNewForm() {
                    this.newItem = {
                        kode: "",
                        judul: "",
                        kategori: "",
                        upbjj: "",
                        lokasiRak: "",
                        qty: 0,
                        safety: 0,
                        harga: 0,
                        catatanHTML: ""
                    };
                }
            }
        }).mount("#stok-app");
    </script>
</body>

</html>
