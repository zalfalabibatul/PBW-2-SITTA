<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Histori Transaksi Bahan Ajar</title>
    <style>
        * { box-sizing: border-box; font-family: Segoe UI, Arial, sans-serif }
        body { margin: 0; padding: 18px; background: linear-gradient(180deg, #edf3ff, #e7effa); color: #1f2f4d }
        .app { max-width: 1150px; margin: auto; background: #fff; border: 1px solid #dbe6fa; border-radius: 14px; box-shadow: 0 14px 34px rgba(21, 39, 84, .12); overflow: hidden }
        .header { background: linear-gradient(135deg, #001a5c, #1f52b7); color: #fff; padding: 20px }
        .header h1 { margin: 0 0 4px; font-size: 24px }
        .content { padding: 16px }
        .toolbar { display: grid; grid-template-columns: 2fr 1fr 1fr auto; gap: 10px; margin-bottom: 12px }
        input, select, button { border-radius: 10px; border: 1px solid #d5def2; padding: 10px 11px; font-size: 14px }
        button { cursor: pointer; font-weight: 700; background: #1745a7; color: #fff; border: none }
        .table-wrap { overflow: auto; border: 1px solid #dde7fa; border-radius: 12px }
        table { width: 100%; border-collapse: collapse; min-width: 1060px }
        th, td { border-bottom: 1px solid #edf1fa; padding: 10px; font-size: 13px; text-align: left }
        th { background: #f3f7ff; color: #32486f; font-size: 12px; text-transform: uppercase; letter-spacing: .02em }
        .badge { display: inline-block; padding: 4px 10px; border-radius: 999px; font-weight: 700; font-size: 12px }
        .done { background: #dcfce7; color: #166534 }
        .ship { background: #dff3ff; color: #0b5f8a }
        .process { background: #fff7dd; color: #9a6700 }
        .status-editor { min-width: 180px; padding: 7px 10px; font-size: 13px }
        .save-status { padding: 8px 11px; font-size: 12px; border-radius: 8px; margin-left: 6px }
        .empty { padding: 16px; text-align: center; color: #6b7b97 }
        .actions { margin-top: 14px }
        .actions a { text-decoration: none; color: #1a3a78; font-weight: 700 }
        @media (max-width: 820px) { .toolbar { grid-template-columns: 1fr } }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <h1>Histori Transaksi Bahan Ajar</h1>
            <div>Riwayat transaksi berdasarkan Delivery Order</div>
        </div>
        <div class="content">
            <div class="toolbar">
                <input id="keyword" type="text" placeholder="Cari nomor DO / nama">
                <select id="statusFilter" aria-label="Filter status transaksi" title="Filter status transaksi">
                    <option value="">Semua Status</option>
                    <option value="Diproses">Diproses</option>
                    <option value="Dikirim">Dikirim</option>
                    <option value="Dalam Perjalanan">Dalam Perjalanan</option>
                    <option value="Diterima">Diterima</option>
                </select>
                <select id="sortBy" aria-label="Urutkan histori transaksi" title="Urutkan histori transaksi">
                    <option value="tanggal">Urut Tanggal</option>
                    <option value="nomor">Urut Nomor DO</option>
                    <option value="nama">Urut Nama</option>
                </select>
                <button id="resetBtn" type="button">Reset</button>
            </div>

            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Nomor DO</th>
                            <th>Nama</th>
                            <th>Tanggal Kirim</th>
                            <th>Paket</th>
                            <th>Total Harga</th>
                            <th>Status</th>
                            <th>Ubah Status</th>
                        </tr>
                    </thead>
                    <tbody id="rows"></tbody>
                </table>
            </div>
            <div class="actions"><a href="dashboard.html">&larr; Kembali ke Dashboard</a></div>
        </div>
    </div>

    <script src="js/data.js"></script>
    <script>
        const rows = document.getElementById("rows");
        const keywordInput = document.getElementById("keyword");
        const statusFilter = document.getElementById("statusFilter");
        const sortBy = document.getElementById("sortBy");
        const resetBtn = document.getElementById("resetBtn");
        const statusOptions = ["Diproses", "Dikirim", "Dalam Perjalanan", "Diterima", "Selesai"];

        function toRupiah(value) {
            return new Intl.NumberFormat("id-ID", { style: "currency", currency: "IDR", maximumFractionDigits: 0 }).format(Number(value) || 0);
        }

        function badgeClass(status) {
            const val = String(status || "").toLowerCase();
            if (val.includes("terima")) return "done";
            if (val.includes("kirim") || val.includes("jalan")) return "ship";
            return "process";
        }

        function getData() {
            return JSON.parse(localStorage.getItem("trackingDOVue")) || window.trackingDOList || [];
        }

        function saveData(data) {
            localStorage.setItem("trackingDOVue", JSON.stringify(data));
        }

        function updateStatus(nomorDO, newStatus) {
            const current = [...getData()];
            const index = current.findIndex(item => String(item.nomorDO) === String(nomorDO));
            if (index === -1) return;
            current[index].status = newStatus;
            saveData(current);
            render();
        }

        function render() {
            let data = [...getData()];
            const keyword = keywordInput.value.trim().toLowerCase();
            const status = statusFilter.value;

            if (keyword) {
                data = data.filter(item =>
                    String(item.nomorDO || "").toLowerCase().includes(keyword) ||
                    String(item.nama || "").toLowerCase().includes(keyword)
                );
            }
            if (status) data = data.filter(item => String(item.status || "") === status);

            if (sortBy.value === "nomor") data.sort((a, b) => String(a.nomorDO).localeCompare(String(b.nomorDO)));
            if (sortBy.value === "nama") data.sort((a, b) => String(a.nama).localeCompare(String(b.nama)));
            if (sortBy.value === "tanggal") data.sort((a, b) => String(b.tanggalKirim).localeCompare(String(a.tanggalKirim)));

            if (data.length === 0) {
                rows.innerHTML = '<tr><td colspan="7" class="empty">Data histori transaksi tidak ditemukan.</td></tr>';
                return;
            }

            rows.innerHTML = data.map(item => `
                <tr>
                    <td>${item.nomorDO || "-"}</td>
                    <td>${item.nama || "-"}</td>
                    <td>${item.tanggalKirim || "-"}</td>
                    <td>${item.paketKode || "-"}</td>
                    <td>${toRupiah(item.totalHarga)}</td>
                    <td><span class="badge ${badgeClass(item.status)}">${item.status || "-"}</span></td>
                    <td>
                        <select class="status-editor" data-do="${item.nomorDO}">
                            ${statusOptions.map(status => `<option value="${status}" ${status === item.status ? "selected" : ""}>${status}</option>`).join("")}
                        </select>
                        <button class="save-status" type="button" data-do="${item.nomorDO}">Simpan</button>
                    </td>
                </tr>
            `).join("");
        }

        keywordInput.addEventListener("input", render);
        statusFilter.addEventListener("change", render);
        sortBy.addEventListener("change", render);
        resetBtn.addEventListener("click", () => {
            keywordInput.value = "";
            statusFilter.value = "";
            sortBy.value = "tanggal";
            render();
        });

        rows.addEventListener("click", (event) => {
            const target = event.target;
            if (!target.classList.contains("save-status")) return;
            const nomorDO = target.getAttribute("data-do");
            const select = rows.querySelector(`.status-editor[data-do="${nomorDO}"]`);
            if (!select) return;
            updateStatus(nomorDO, select.value);
        });

        render();
    </script>
</body>
</html>
